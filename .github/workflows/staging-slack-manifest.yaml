name: deploy-slack-manifest-staging

on:
  push:
    branches:
      - staging
    paths:
      - 'apps/server/slack/manifest.template.json'
  workflow_dispatch:

jobs:
  update-slack-manifest:
    name: Update Slack Manifest
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Render manifest.json
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          APP_NAME: "Zap Staging"
          COMMAND_PREFIX: "zap-staging"
        run: node apps/server/scripts/generate-manifest.js

      - name: Refresh Slack Token
        id: refresh_token
        env:
          SLACK_REFRESH_TOKEN: ${{ secrets.SLACK_REFRESH_TOKEN }}
        run: |
          RESPONSE=$(curl -sS -X POST https://slack.com/api/tooling.tokens.rotate \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "refresh_token=$SLACK_REFRESH_TOKEN")

          if jq -e '.ok == true' <<< "$RESPONSE" > /dev/null; then
            NEW_REFRESH=$(jq -r .refresh_token <<< "$RESPONSE")
            NEW_ACCESS=$(jq -r .token <<< "$RESPONSE")
            
            echo "::add-mask::$NEW_REFRESH"
            echo "::add-mask::$NEW_ACCESS"
            
            echo "SLACK_TOKEN=$NEW_ACCESS" >> $GITHUB_ENV
            echo "NEW_REFRESH=$NEW_REFRESH" >> $GITHUB_ENV
          else
            echo "Rotation failed: $(jq -r .error <<< "$RESPONSE")"
            exit 1
          fi

      - name: Sync New Token to Doppler (Staging & Prod)
        run: |
          # Update Staging
          DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_GH_STAGING }} \
            doppler secrets set SLACK_REFRESH_TOKEN="$NEW_REFRESH" > /dev/null
          
          # Update Production
          DOPPLER_TOKEN=${{ secrets.DOPPLER_TOKEN_GH_PROD }} \
            doppler secrets set SLACK_REFRESH_TOKEN="$NEW_REFRESH" > /dev/null
            
          echo "Doppler sync completed for both environments."

      - name: Update Slack manifest
        env:
          SLACK_TOKEN: ${{ env.SLACK_TOKEN }}
          SLACK_APP_ID: ${{ secrets.SLACK_APP_ID }}
        run: |
          MANIFEST_JSON=$(jq -c . apps/server/slack/manifest.json)
          
          RESPONSE=$(curl -sS -X POST https://slack.com/api/apps.manifest.update \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -H "Content-Type: application/json" \
            --data "{\"app_id\":\"$SLACK_APP_ID\",\"manifest\":$MANIFEST_JSON}")

          if jq -e '.ok == false' <<< "$RESPONSE" > /dev/null; then
            echo "Update failed: $(jq -r .error <<< "$RESPONSE")"
            exit 1
          fi
          echo "Slack manifest updated successfully."